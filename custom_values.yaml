executor: "KubernetesExecutor"
redis:
  enabled: false

postgresql:
  image:
    # Lệnh 1: Chỉ định máy chủ lưu trữ là Docker Hub (mặc định)
    registry: docker.io 
    # Lệnh 2: Bẻ lái đường dẫn từ kho chính 'bitnami' sang kho cũ 'bitnamilegacy'
    repository: bitnamilegacy/postgresql 
    # Lưu ý: Không khai báo 'tag' ở đây nữa. Hệ thống sẽ tự động bốc đúng 
    # phiên bản tag mặc định (16.1.0-debian-11-r15) vốn đang nằm sẵn trong kho legacy.

images:
  airflow:
    repository: my-airflow-dbt
    tag: "1.0"
    pullPolicy: Never

dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: "https://github.com/ndmanh2005/bank_dwh.git"
    branch: "main"
    subPath: ""
    wait: 60

logs:
  persistence:
    enabled: true
    size: 1Gi